<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOH — Feature Dictionary v7 · Full Engine</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Malgun Gothic', sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 20px; max-width: 1000px; margin: 0 auto; }
h1 { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.meta { font-size: 11px; color: #555; margin-bottom: 20px; }
.tab-bar { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid #1e1e1e; padding-bottom: 12px; flex-wrap: wrap; }
.tab { font-size: 12px; padding: 5px 14px; border-radius: 16px; border: 1px solid #2a2a2a; background: #1a1a1a; color: #666; cursor: pointer; transition: all .12s; }
.tab.active { background: #5BB8FF; color: #000; border-color: transparent; font-weight: 600; }
.q-block { margin-bottom: 20px; border: 1px solid #1e1e1e; border-radius: 10px; overflow: hidden; }
.q-head { background: #1a1a1a; padding: 10px 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.q-id { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 5px; background: #1D9E7520; color: #1D9E75; }
.q-grade { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
.q-name { font-size: 11px; color: #5BB8FF; }
.q-text { font-size: 13px; color: #ddd; padding: 10px 14px; border-bottom: 1px solid #1a1a1a; }
.opt-table { width: 100%; }
.opt-row { display: grid; grid-template-columns: 24px 1fr 1fr; border-bottom: 1px solid #111; }
.opt-row:last-child { border-bottom: none; }
.opt-num { background: #111; color: #444; font-size: 10px; display: flex; align-items: center; justify-content: center; padding: 8px 4px; }
.opt-text { padding: 8px 12px; font-size: 11px; color: #888; border-left: 1px solid #1a1a1a; }
.opt-features { padding: 8px 12px; border-left: 1px solid #1a1a1a; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
.feat-tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #5BB8FF15; color: #5BB8FF; border: 1px solid #5BB8FF30; white-space: nowrap; }
.follow-tag { font-size: 9px; color: #378ADD; margin-left: 2px; }
.col-header { display: grid; grid-template-columns: 24px 1fr 1fr; background: #0d0d0d; }
.col-h { font-size: 9px; color: #333; font-weight: 600; letter-spacing: 0.06em; padding: 5px 12px; }
.follow-section { border-top: 1px solid #1a1a1a; background: #0d0d0d; padding: 6px 14px 10px; }
.follow-id { font-size: 10px; color: #2a2a2a; margin-bottom: 4px; margin-top: 8px; }
.follow-q { font-size: 11px; color: #555; margin-bottom: 6px; }
.feat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
.feat-card { border: 1px solid #1e1e1e; border-radius: 8px; padding: 12px; background: #161616; }
.feat-id { font-size: 10px; font-weight: 700; color: #5BB8FF; margin-bottom: 4px; }
.feat-name { font-size: 12px; color: #ccc; margin-bottom: 8px; }
.feat-range { display: flex; gap: 4px; flex-wrap: wrap; }
.range-item { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #111; border: 1px solid #222; color: #666; }
.range-item span { color: #5BB8FF; margin-right: 3px; }
.pattern-card { border: 1px solid #1e1e1e; border-radius: 8px; padding: 12px; background: #161616; margin-bottom: 10px; }
.pattern-name { font-size: 13px; font-weight: 600; color: #D4537E; margin-bottom: 8px; }
.pattern-cond { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.chain-tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #D4537E15; color: #D4537E; border: 1px solid #D4537E30; }
.cond-tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #5BB8FF15; color: #5BB8FF; border: 1px solid #5BB8FF30; }
.vector-area { background: #111; border-radius: 8px; padding: 16px; font-family: monospace; font-size: 11px; color: #5BB8FF; white-space: pre-wrap; min-height: 300px; line-height: 1.6; }
.vector-controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.v-btn { font-size: 11px; padding: 6px 14px; border-radius: 6px; border: 1px solid #2a2a2a; background: #1a1a1a; color: #888; cursor: pointer; }
.v-btn:hover { color: #fff; border-color: #444; }
.v-btn.primary { background: #5BB8FF; color: #000; border-color: transparent; font-weight: 600; }
.section-label { font-size: 10px; color: #444; margin-top: 8px; margin-bottom: 4px; font-weight: 600; letter-spacing: 0.06em; }
#view-questions, #view-features, #view-patterns, #view-vector,
#view-nodes, #view-clusters, #view-chains { display: none; }
#view-questions.active, #view-features.active, #view-patterns.active, #view-vector.active,
#view-nodes.active, #view-clusters.active, #view-chains.active { display: block; }

/* ── NODE / CLUSTER / CHAIN CARDS ── */
.engine-section-title {
  font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: #444; margin: 18px 0 10px; padding-bottom: 6px; border-bottom: 1px solid #1a1a1a;
}
.node-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 10px; }
.node-card { border-radius: 8px; padding: 12px 14px; background: #111; border-left: 3px solid #333; }
.node-card.root    { border-color: #e07840; }
.node-card.comp    { border-color: #c4973a; }
.node-card.result  { border-color: #e05a5a; }
.node-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.node-id { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
  background: #1a1a1a; color: #888; font-family: monospace; }
.node-layer-badge { font-size: 9px; padding: 1px 6px; border-radius: 3px; font-weight: 600; }
.node-pw { font-size: 10px; color: #555; margin-left: auto; }
.node-name { font-size: 13px; font-weight: 700; color: #ddd; }
.node-ko { font-size: 11px; color: #666; margin-bottom: 6px; }
.node-desc { font-size: 10px; color: #555; margin-bottom: 8px; line-height: 1.5; }
.node-feats-list { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
.node-feat-tag { font-size: 9px; padding: 2px 7px; border-radius: 4px;
  background: #1a1a1a; border: 1px solid #2a2a2a; color: #888; font-family: monospace; }
.node-feat-op { color: #5BB8FF; }
.node-rp-label { font-size: 9px; color: #333; margin-top: 4px; }
.node-rp-tag { font-size: 9px; padding: 1px 5px; border-radius: 3px;
  background: #5BB8FF15; border: 1px solid #5BB8FF30; color: #5BB8FF; font-family: monospace; }
.node-ms-row { font-size: 9px; color: #444; margin-top: 4px; }

/* Edge table */
.edge-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.edge-table th { font-size: 9px; color: #444; font-weight: 600; letter-spacing: .08em;
  text-transform: uppercase; padding: 6px 12px; border-bottom: 1px solid #1a1a1a; text-align: left; }
.edge-table td { padding: 6px 12px; border-bottom: 1px solid #111; }
.edge-table tr:hover td { background: #111; }
.edge-s.strong   { color: #2ecc8a; }
.edge-s.moderate { color: #c4973a; }
.edge-s.weak     { color: #555; }
.edge-from { color: #e07840; font-family: monospace; font-weight: 700; }
.edge-to   { color: #e05a5a; font-family: monospace; font-weight: 700; }

/* Cluster card */
.cluster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; }
.cluster-card { border: 1px solid #1e1e1e; border-radius: 8px; padding: 12px 14px; background: #111; }
.cluster-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.cluster-id { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px;
  background: #e05a5a18; border: 1px solid #e05a5a30; color: #e05a5a; font-family: monospace; }
.cluster-name { font-size: 13px; font-weight: 700; color: #ddd; }
.cluster-ko { font-size: 11px; color: #666; margin-bottom: 6px; }
.cluster-rule-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }
.cluster-rule-tag { font-size: 9px; padding: 2px 7px; border-radius: 4px;
  background: #e05a5a12; border: 1px solid #e05a5a25; color: #e05a5a; font-family: monospace; }
.cluster-rp-tag { font-size: 9px; padding: 2px 7px; border-radius: 4px;
  background: #5BB8FF12; border: 1px solid #5BB8FF25; color: #5BB8FF; font-family: monospace; }
.cluster-label { font-size: 9px; color: #333; font-weight: 600; letter-spacing: .06em;
  text-transform: uppercase; margin-top: 6px; margin-bottom: 3px; }

/* Chain card */
.chain-card-full { border: 1px solid #1e1e1e; border-radius: 10px; padding: 14px; background: #111; margin-bottom: 12px; }
.chain-header-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.chain-cluster-badge { font-size: 9px; padding: 2px 8px; border-radius: 4px; font-weight: 700; }
.chain-title { font-size: 14px; font-weight: 700; color: #ddd; }
.chain-ko-text { font-size: 11px; color: #666; }
.chain-steps-list { border-left: 2px solid #1e1e1e; margin-left: 8px; padding-left: 14px; }
.chain-step-item { margin-bottom: 10px; position: relative; }
.chain-step-item::before { content: ''; position: absolute; left: -18px; top: 5px;
  width: 8px; height: 8px; border-radius: 50%; background: #333; }
.chain-step-item.cause::before  { background: #e07840; }
.chain-step-item.comp::before   { background: #c4973a; }
.chain-step-item.result::before { background: #e05a5a; }
.chain-step-label { font-size: 11px; font-weight: 700; color: #bbb; }
.chain-step-label.cause  { color: #e07840; }
.chain-step-label.comp   { color: #c4973a; }
.chain-step-label.result { color: #e05a5a; }
.chain-step-desc { font-size: 10px; color: #555; line-height: 1.5; margin-top: 2px; }
.chain-step-feats { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.chain-step-feat { font-size: 9px; padding: 1px 5px; border-radius: 3px;
  background: #1a1a1a; border: 1px solid #2a2a2a; color: #666; font-family: monospace; }
.chain-track-box { background: #0d0d0d; border-radius: 6px; padding: 10px 12px; margin-top: 10px; }
.chain-track-label { font-size: 9px; color: #333; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; margin-bottom: 3px; }
.chain-track-a { font-size: 10px; color: #c4973a; line-height: 1.5; }
.chain-track-b { font-size: 10px; color: #5BB8FF; line-height: 1.5; margin-top: 4px; }
.chain-drill-box { font-size: 10px; color: #2ecc8a; margin-top: 6px; padding: 6px 10px;
  background: #2ecc8a0a; border-left: 2px solid #2ecc8a30; border-radius: 0 4px 4px 0; }
.chain-drill-label { font-size: 9px; color: #2ecc8a60; letter-spacing: .08em; margin-bottom: 2px; }
</style>
</head>

const GRADE_STYLE = {
  S:{bg:'#1D9E7520',color:'#1D9E75',label:'S급'},
  A:{bg:'#378ADD20',color:'#378ADD',label:'A급'},
  B:{bg:'#BA751720',color:'#BA7517',label:'B급'},
  R:{bg:'#D85A3020',color:'#D85A30',label:'결과형'},
};
const NUMS = ['①','②','③','④'];

function init() {
  const m = MASTER.metadata;
  document.getElementById('meta-info').textContent =
    'v7 · ' + m.total_questions + '개 주질문 · Feature ' + (Object.keys(MASTER.features).length) + '개 · Pattern ' + Object.keys(MASTER.pattern_hints).length + '개 · Node ' + Object.keys(NODES).length + '개 · Cluster ' + Object.keys(CLUSTERS).length + '개 · Chain ' + Object.keys(CHAINS).length + '개';
  renderQuestions();
  renderFeatures();
  renderPatterns();
  renderNodes();
  renderClusters();
  renderChains();
}

function renderQuestions() {
  const c = document.getElementById('view-questions');
  c.innerHTML = MASTER.questions.map(function(q) {
    const g = GRADE_STYLE[q.grade] || GRADE_STYLE.B;
    const opts = q.options.map(function(opt, i) {
      const feats = Object.entries(opt.features||{}).map(function(e){
        return '<span class="feat-tag">'+e[0]+': '+e[1]+'</span>';
      }).join('');
      const fn = (opt.follow && q.follow_questions && q.follow_questions[opt.follow]) ? '<span class="follow-tag">↳ '+opt.follow+'</span>' : (opt.follow ? '<span style="font-size:9px;color:#2a2a2a" title="follow question 미정의: '+opt.follow+'">↳ '+opt.follow+' ⚠️</span>' : '');
      return '<div class="opt-row"><div class="opt-num">'+NUMS[i]+'</div><div class="opt-text">'+opt.text+'</div><div class="opt-features">'+(feats||'<span style="color:#222;font-size:10px">—</span>')+fn+'</div></div>';
    }).join('');

    const follows = Object.entries(q.follow_questions||{}).map(function(entry) {
      const fid = entry[0]; const fq = entry[1];
      const depth = (fid.match(/-/g)||[]).length - 1;
      const fopts = fq.options.map(function(opt, i) {
        const feats = Object.entries(opt.features||{}).map(function(e){
          return '<span class="feat-tag">'+e[0]+': '+e[1]+'</span>';
        }).join('');
        const fn = (opt.follow && q.follow_questions && q.follow_questions[opt.follow]) ? '<span class="follow-tag">↳ '+opt.follow+'</span>' : (opt.follow ? '<span style="font-size:9px;color:#2a2a2a" title="follow question 미정의: '+opt.follow+'">↳ '+opt.follow+' ⚠️</span>' : '');
        return '<div class="opt-row"><div class="opt-num" style="color:#333">'+NUMS[i]+'</div><div class="opt-text" style="color:#555">'+opt.text+'</div><div class="opt-features">'+(feats||'<span style="color:#222;font-size:10px">—</span>')+fn+'</div></div>';
      }).join('');
      const arrows = new Array(depth+2).join('↳');
      return '<div class="follow-section" style="padding-left:'+(14+depth*12)+'px"><div class="follow-id">'+arrows+' '+fid+'</div><div class="follow-q">'+fq.question+'</div>'+fopts+'</div>';
    }).join('');

    return '<div class="q-block"><div class="q-head"><span class="q-id">'+q.id+'</span><span class="q-grade" style="background:'+g.bg+';color:'+g.color+'">'+g.label+'</span><span class="q-name">'+q.name+'</span><span style="font-size:10px;color:#333;margin-left:auto">'+q.category+'</span></div><div class="q-text">'+q.question+'</div><div class="col-header"><div class="col-h"></div><div class="col-h">선택지</div><div class="col-h">Feature 값 매핑</div></div><div class="opt-table">'+opts+'</div>'+follows+'</div>';
  }).join('');
}

function renderFeatures() {
  const c = document.getElementById('view-features');
  c.innerHTML = '<div class="feat-grid">'+Object.entries(MASTER.features).map(function(entry) {
    const key = entry[0]; const f = entry[1];
    const ranges = [];
    for(var v=f.range[0]; v<=f.range[1]; v++) {
      ranges.push('<div class="range-item"><span>'+v+'</span>'+(f[String(v)]||'')+'</div>');
    }
    var typeBadge = f.type ? '<span style="font-size:8px;padding:1px 5px;border-radius:3px;margin-left:4px;'+(f.type==='subjective'?'background:#e0784018;color:#e07840;border:1px solid #e0784030':'background:#5BB8FF18;color:#5BB8FF;border:1px solid #5BB8FF30')+'">'+(f.type==='subjective'?'주관':'객관')+'</span>' : '';
    return '<div class="feat-card"><div class="feat-id">'+key+typeBadge+'</div><div class="feat-name">'+f.name+'</div><div class="feat-range">'+ranges.join('')+'</div></div>';
  }).join('')+'</div>';
}

function renderPatterns() {
  const c = document.getElementById('view-patterns');
  c.innerHTML = Object.entries(MASTER.pattern_hints).map(function(entry) {
    const p = entry[1];
    const conds = Object.entries(p.conditions).map(function(e){
      return '<span class="cond-tag">'+e[0]+' '+e[1]+'</span>';
    }).join('');
    const chains = (p.compensation_chains||[]).map(function(ch){
      return '<span class="chain-tag">'+ch+'</span>';

    return '<div class="pattern-card"><div class="pattern-name">'+p.name+'</div><div class="section-label">조건 (Feature 조합)</div><div class="pattern-cond">'+conds+'</div><div class="section-label">보상 체인</div><div class="pattern-cond">'+chains+'</div></div>';

function simulateVector() {
  var vector = {};
  MASTER.questions.forEach(function(q) {
    var idx = Math.floor(Math.random()*q.options.length);
    var opt = q.options[idx];
    Object.entries(opt.features||{}).forEach(function(e){
      vector[e[0]] = (vector[e[0]]===undefined) ? e[1] : Math.round((vector[e[0]]+e[1])/2);
    });
    if(opt.follow && q.follow_questions && q.follow_questions[opt.follow]) {
      // Recursively traverse nested follow questions
      var followKey = opt.follow;
      var depth = 0;
      while(followKey && q.follow_questions[followKey] && depth < 8) {
        var fq = q.follow_questions[followKey];
        var fidx = Math.floor(Math.random()*fq.options.length);
        var fopt = fq.options[fidx];
        Object.entries(fopt.features||{}).forEach(function(e){
          vector[e[0]] = (vector[e[0]]===undefined) ? e[1] : Math.round((vector[e[0]]+e[1])/2);
        });
        followKey = fopt.follow || null;
        depth++;
      }
    }
  });

  var matched = []; var partial = [];
  Object.entries(MASTER.pattern_hints).forEach(function(entry) {
    var p = entry[1];
    var matchCount = 0; var total = Object.keys(p.conditions).length;
    Object.entries(p.conditions).forEach(function(ce) {
      var val = vector[ce[0]]; if(val===undefined) return;
      var m = ce[1].match(/^(>=|<=|>|<)/);
      if(!m) return;
      var op = m[1]; var num = parseFloat(ce[1].replace(/^[><=]+/,''));
      var ok = (op==='>='&&val>=num)||(op==='<='&&val<=num)||(op==='>'&&val>num)||(op==='<'&&val<num);
      if(ok) matchCount++;
    });
    if(matchCount===total) matched.push(p.name);
    else if(matchCount>=total*0.6) partial.push(p.name+' ('+matchCount+'/'+total+')');
  });

  var vecLines = Object.keys(vector).sort().map(function(k){
    return '  "'+k+'": '+vector[k];
  }).join(',\n');

  var chainLines = matched.map(function(name){
    var p = Object.values(MASTER.pattern_hints).find(function(p){return p.name===name;});
    return p ? '['+name+'] \u2192 '+p.compensation_chains.join(' \u2192 ') : '';
  }).filter(Boolean).join('\n');

  document.getElementById('vector-output').textContent =
    '// \u2500\u2500\u2500 Feature Vector \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n{\n'+vecLines+'\n}\n\n'+
    '// \u2500\u2500\u2500 \ud328\ud134 \ub9e4\uce6d \uacb0\uacfc \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n'+
    '\ud655\uc815 \ud328\ud134: '+(matched.length?matched.join(', '):'\uc5c6\uc74c')+'\n'+
    '\ubd80\ubd84 \ub9e4\uce6d: '+(partial.length?partial.join(', '):'\uc5c6\uc74c')+'\n\n'+
    '// \u2500\u2500\u2500 \ubcf4\uc0c1 \uccb4\uc778 \ud6c4\ubcf4 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n'+(chainLines||'\uc5c6\uc74c');
}

  "C11-B":{cluster:"C11",name:"Pressure Fail → Depth Compensation",ko:"압력 실패 딥 보상형",badge_color:"#5bc4ee",
    ra:[{f:"pressure_shift_timing",op:"<=",v:1},{f:"trail_foot_pressure_location",op:">=",v:2}],
    steps:[
      {label:"Pressure Shift Failure",type:"cause",desc:"Trail→Lead 압력 이동 실패 → 체중이 오른쪽에 잔류 (N01 활성)",feats:["pressure_shift_timing","trail_foot_pressure_location"]},
      {label:"Release Delay / Push Compensation",type:"comp",desc:"체중 오른쪽에 남아 릴리즈 지연 → 팔을 더 인사이드로 끌어들여 보상",feats:["release_timing","hand_path","arm_drop_depth"]},
      {label:"Slice / Push Result",type:"result",desc:"보상 실패 시 슬라이스/푸시 확정 → ball_flight_tendency +2",feats:["ball_flight_tendency","impact_stability"]},
    ],
    track_a:"압력 이동 실패 → 릴리즈 지연 → 슬라이스/푸시",
    track_b:"Pressure shift 복원 → 릴리즈 타이밍 자연 회복 → 구질 중립화",
    drill:"Step drill → Weight shift feel → Release checkpoint",
  },
};

// ══════════════════════════════════════════════════════
// RENDER: NODES
// ══════════════════════════════════════════════════════
function renderNodes() {
  const c = document.getElementById('view-nodes');
  const LC = {root_cause:"root",compensation:"comp",cluster_result:"result"};
  const LN = {root_cause:"Root Cause",compensation:"Compensation",cluster_result:"Cluster Result"};
  const LC_COLOR = {root_cause:"#e07840",compensation:"#c4973a",cluster_result:"#e05a5a"};

  // Group by layer
  const groups = {root_cause:[], compensation:[], cluster_result:[]};
  Object.values(NODES).forEach(function(n){ groups[n.layer].push(n); });

  var html = '';

  // Edge table
  html += '<div class="engine-section-title">인과 엣지 (Edge) — ' + EDGES.length + '개</div>';
  html += '<table class="edge-table"><thead><tr><th>FROM</th><th>→</th><th>TO</th><th>강도</th><th>의미</th></tr></thead><tbody>';
  EDGES.forEach(function(e){
    html += '<tr><td class="edge-from">' + e.from + ' ' + (NODES[e.from]?NODES[e.from].name:'') +
      '</td><td style="color:#333">→</td><td class="edge-to">' + e.to + ' ' + (NODES[e.to]?NODES[e.to].ko:'') +
      '</td><td class="edge-s ' + e.s + '">' + e.s + '</td><td style="font-size:10px;color:#555">' + (e.note||'') + '</td></tr>';
  });
  html += '</tbody></table>';

  ['root_cause','compensation','cluster_result'].forEach(function(layer){
    html += '<div class="engine-section-title" style="color:' + LC_COLOR[layer] + '">' + LN[layer] + ' (' + groups[layer].length + '개)</div>';
    html += '<div class="node-grid">';
    groups[layer].forEach(function(n){
      const cls = LC[n.layer] || 'comp';
      const lbg = LC_COLOR[n.layer] || '#888';
      const featsHtml = n.feats.map(function(f){
        return '<span class="node-feat-tag"><span class="node-feat-op">' + f.f + '</span> ' + f.op + ' ' + f.v + ' <span style="color:#555">(w:' + f.w + ')</span></span>';
      }).join('');
      const rpHtml = n.rp.map(function(r){ return '<span class="node-rp-tag">' + r + '</span>'; }).join(' ');
      html += '<div class="node-card ' + cls + '">' +
        '<div class="node-header">' +
          '<span class="node-id">' + n.id + '</span>' +
          '<span class="node-layer-badge" style="background:' + lbg + '18;color:' + lbg + ';border:1px solid ' + lbg + '30">' + LN[n.layer] + '</span>' +
          (n.bottleneck ? '<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:#2ecc8a18;color:#2ecc8a;border:1px solid #2ecc8a30">BOTTLENECK</span>' : '') +
          '<span class="node-pw">Priority:' + n.pw + '</span>' +
        '</div>' +
        '<div class="node-name">' + n.name + '</div>' +
        '<div class="node-ko">' + n.ko + '</div>' +
        '<div class="node-desc">' + n.desc + '</div>' +
        '<div class="node-feats-list">' + featsHtml + '</div>' +
        '<div class="node-rp-label">require_positive: ' + rpHtml + '</div>' +
        '<div class="node-ms-row">min_score: <span style="color:#5BB8FF">' + n.ms + '</span> · min_conditions: <span style="color:#5BB8FF">' + n.rmc + '</span>' +
          (n.cluster ? ' · cluster: <span style="color:#e05a5a">' + n.cluster + '</span>' : '') +
          (n.flag ? ' · <span style="color:#e07840">⚑ ' + n.flag + '</span>' : '') +
        '</div>' +
      '</div>';
    });
    html += '</div>';
  });

  c.innerHTML = html;
}

// ══════════════════════════════════════════════════════
// RENDER: CLUSTERS
// ══════════════════════════════════════════════════════
function renderClusters() {
  const c = document.getElementById('view-clusters');
  var html = '<div class="engine-section-title">클러스터 정의 — Feature Vector → 패턴 분류 규칙</div>';
  html += '<div class="cluster-grid">';
  Object.entries(CLUSTERS).forEach(function(entry){
    const cid = entry[0]; const cl = entry[1];
    const rulesHtml = cl.rules.map(function(r){
      return '<span class="cluster-rule-tag">' + r.f + ' ' + r.op + ' ' + r.v + '</span>';
    }).join('');
    const rpHtml = cl.rp.map(function(f){ return '<span class="cluster-rp-tag">' + f + '</span>'; }).join('');
    const raHtml = cl.ra.length ? cl.ra.map(function(f){ return '<span class="cluster-rp-tag" style="background:#2ecc8a12;border-color:#2ecc8a25;color:#2ecc8a">' + f + '</span>'; }).join('') : '<span style="font-size:9px;color:#333">—</span>';

    // 연결된 노드 찾기
    const linkedNodes = Object.values(NODES).filter(function(n){ return n.cluster === cid; });
    const linkedHtml = linkedNodes.map(function(n){ return '<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:#1a1a1a;border:1px solid #2a2a2a;color:#666">' + n.id + '</span>'; }).join(' ');

    // 연결된 체인 찾기
    const linkedChains = Object.keys(CHAINS).filter(function(k){ return CHAINS[k].cluster === cid; });
    const chainsHtml = linkedChains.map(function(k){ return '<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:#D4537E15;color:#D4537E;border:1px solid #D4537E30">' + k + '</span>'; }).join(' ');

    html += '<div class="cluster-card">' +
      '<div class="cluster-header">' +
        '<span class="cluster-id">' + cid + '</span>' +
        '<div><div class="cluster-name">' + cl.name + '</div><div class="cluster-ko">' + cl.ko + '</div></div>' +
      '</div>' +
      '<div class="cluster-label">필수 조건 (rules)</div>' +
      '<div class="cluster-rule-row">' + rulesHtml + '</div>' +
      '<div class="cluster-label">require_positive</div>' +
      '<div class="cluster-rule-row">' + (rpHtml || '<span style="font-size:9px;color:#333">없음</span>') + '</div>' +
      '<div class="cluster-label">require_any</div>' +
      '<div class="cluster-rule-row">' + raHtml + '</div>' +
      '<div class="cluster-label">연결 노드</div>' +
      '<div class="cluster-rule-row">' + (linkedHtml || '<span style="font-size:9px;color:#333">없음</span>') + '</div>' +
      '<div class="cluster-label">인과 체인</div>' +
      '<div class="cluster-rule-row">' + (chainsHtml || '<span style="font-size:9px;color:#333">없음</span>') + '</div>' +
    '</div>';
  });
  html += '</div>';
  c.innerHTML = html;
}

// ══════════════════════════════════════════════════════
// RENDER: CHAINS
// ══════════════════════════════════════════════════════
function renderChains() {
  const c = document.getElementById('view-chains');
  var html = '<div class="engine-section-title">인과 체인 — 원인 → 보상 → 결과 흐름 정의 (' + Object.keys(CHAINS).length + '개)</div>';

  // Group by cluster
  const byCluster = {};
  Object.entries(CHAINS).forEach(function(entry){
    const k = entry[0]; const ch = entry[1];
    if(!byCluster[ch.cluster]) byCluster[ch.cluster] = [];
    byCluster[ch.cluster].push({key:k, ch:ch});
  });

  Object.entries(byCluster).forEach(function(entry){
    const cid = entry[0]; const items = entry[1];
    const cl = CLUSTERS[cid];
    html += '<div class="engine-section-title" style="color:#e05a5a;margin-top:20px">' +
      cid + ' · ' + (cl ? cl.name + ' (' + cl.ko + ')' : '') +
    '</div>';

    items.forEach(function(item){
      const k = item.key; const ch = item.ch;
      const stepsHtml = ch.steps.map(function(step){
        const featsHtml = (step.feats||[]).map(function(f){
          return '<span class="chain-step-feat">' + f + '</span>';
        }).join('');
        return '<div class="chain-step-item ' + step.type + '">' +
          '<div class="chain-step-label ' + step.type + '">' + step.label + ' <span style="font-size:9px;font-weight:400;color:#555">(' + step.type + ')</span></div>' +
          '<div class="chain-step-desc">' + step.desc + '</div>' +
          '<div class="chain-step-feats">' + featsHtml + '</div>' +
        '</div>';
      }).join('');

      const raHtml = ch.ra.map(function(r){
        return '<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:' + ch.badge_color + '15;border:1px solid ' + ch.badge_color + '30;color:' + ch.badge_color + '">' + r.f + ' ' + r.op + ' ' + r.v + '</span>';
      }).join(' ');

      html += '<div class="chain-card-full">' +
        '<div class="chain-header-row">' +
          '<span class="chain-cluster-badge" style="background:' + ch.badge_color + '18;border:1px solid ' + ch.badge_color + '30;color:' + ch.badge_color + '">' + k + '</span>' +
          '<div>' +
            '<div class="chain-title">' + ch.name + '</div>' +
            '<div class="chain-ko-text">' + ch.ko + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="cluster-label" style="margin-bottom:6px">체인 발화 조건 (require_any)</div>' +
        '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px">' + (raHtml || '<span style="font-size:9px;color:#333">조건 없음 (클러스터 매칭 시 자동)</span>') + '</div>' +
        '<div class="chain-steps-list">' + stepsHtml + '</div>' +
        '<div class="chain-track-box">' +
          '<div class="chain-track-label">Track A — 현재 보상 패턴</div>' +
          '<div class="chain-track-a">' + ch.track_a + '</div>' +
          '<div class="chain-track-label" style="margin-top:8px">Track B — 교정 방향</div>' +
          '<div class="chain-track-b">' + ch.track_b + '</div>' +
        '</div>' +
        '<div class="chain-drill-box">' +
          '<div class="chain-drill-label">DRILL</div>' + ch.drill +
        '</div>' +
      '</div>';
    });
  });

  c.innerHTML = html;
}

init();
</script>
</body>
</html>
