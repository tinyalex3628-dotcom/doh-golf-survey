<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOH — Test Runner v3 · Debug</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#060608;--s1:#0c0c10;--s2:#111116;--s3:#16161e;
  --b1:#1c1c26;--b2:#242432;--b3:#30304a;
  --t1:#eeeef6;--t2:#8080a0;--t3:#383850;
  --green:#1db870;--green-dim:#0d7a48;
  --red:#e04444;--blue:#4a80e8;--gold:#c09030;
  --orange:#d06830;--sky:#40b8d8;--purple:#8060c8;
  --pass:#1db870;--fail:#555568;
}
body{font-family:'SF Mono','Consolas','Malgun Gothic',monospace;background:var(--bg);color:var(--t1);font-size:12px;overflow:hidden;height:100vh;}

/* ── HEADER ── */
.hd{height:42px;padding:0 20px;background:var(--s1);border-bottom:1px solid var(--b1);
  display:flex;align-items:center;gap:12px;}
.hd-logo{font-size:10px;font-weight:700;letter-spacing:.2em;color:var(--t3);text-transform:uppercase;}
.hd-title{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.01em;}
.hd-title em{color:var(--green);font-style:normal;}
.hd-ver{font-size:9px;padding:2px 7px;border-radius:3px;background:var(--green)18;border:1px solid var(--green)30;color:var(--green);margin-left:4px;}
.hd-badges{display:flex;gap:5px;margin-left:auto;}
.hb{font-size:9px;padding:2px 8px;border-radius:3px;font-weight:700;}

/* ── LAYOUT ── */
.layout{display:flex;height:calc(100vh - 42px);}

/* ── LEFT INPUT ── */
.left{width:300px;flex-shrink:0;border-right:1px solid var(--b1);display:flex;flex-direction:column;background:var(--s1);}
.ph{padding:10px 14px;border-bottom:1px solid var(--b1);font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:6px;}
.pb{flex:1;overflow-y:auto;padding:12px 14px;}

textarea#ji{width:100%;height:200px;background:var(--s2);border:1px solid var(--b1);color:var(--t1);
  border-radius:4px;padding:10px;font-size:11px;font-family:inherit;resize:none;outline:none;line-height:1.6;}
textarea#ji:focus{border-color:var(--blue)80;}

.run{width:100%;margin:8px 0;padding:9px;background:var(--green);border:none;color:#000;
  font-size:12px;font-weight:700;cursor:pointer;border-radius:4px;font-family:inherit;
  letter-spacing:.02em;transition:opacity .1s;}
.run:hover{opacity:.85;}

.sl{font-size:9px;color:var(--t3);margin:10px 0 5px;text-transform:uppercase;letter-spacing:.08em;}
.sg{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
.sm{font-size:10px;padding:3px 8px;border-radius:3px;border:1px solid var(--b2);background:transparent;
  color:var(--t3);cursor:pointer;font-family:inherit;transition:all .1s;}
.sm:hover{border-color:var(--b3);color:var(--t2);}

/* Case log */
.cl-head{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin:10px 0 5px;display:flex;align-items:center;gap:6px;}
.cl-body{max-height:160px;overflow-y:auto;}
.cl-row{padding:5px 8px;border-radius:3px;margin-bottom:2px;cursor:pointer;border:1px solid var(--b1);font-size:10px;transition:border-color .1s;}
.cl-row:hover{border-color:var(--b2);}
.cl-row.sel{border-color:var(--blue)60;background:var(--blue)08;}
.cl-id{color:var(--t3);margin-right:5px;}
.cl-name{color:var(--t2);}
.cl-tag{font-size:9px;color:var(--red);margin-left:auto;}
.cl-v{font-size:9px;color:var(--gold);}

/* ── RIGHT OUTPUT ── */
.right{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* Tab bar */
.tabs{display:flex;border-bottom:1px solid var(--b1);background:var(--s1);}
.tab{padding:10px 16px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .1s;}
.tab:hover{color:var(--t2);}
.tab.active{color:var(--green);border-bottom-color:var(--green);}
.tab-badge{font-size:9px;padding:1px 5px;border-radius:2px;margin-left:4px;background:var(--b1);}

/* Tab contents */
.tab-content{display:none;flex:1;overflow:hidden;}
.tab-content.active{display:flex;}

/* Panel shared */
.panel{flex:1;overflow-y:auto;padding:14px 16px;}
.panel-2col{display:grid;grid-template-columns:1fr 1fr;gap:1px;flex:1;overflow:hidden;background:var(--b1);}
.panel-col{overflow-y:auto;padding:14px 16px;background:var(--bg);}

/* Section */
.sec{margin-bottom:14px;}
.sec-title{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--t3);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--b1);}

/* ── REASONING TRACE ── */
.trace-block{background:var(--s2);border:1px solid var(--b1);border-radius:4px;padding:10px 12px;margin-bottom:8px;}
.trace-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;}
.trace-node-id{font-size:10px;font-weight:700;color:var(--t3);}
.trace-node-name{font-size:12px;font-weight:700;}
.trace-status{font-size:10px;padding:2px 8px;border-radius:3px;margin-left:auto;font-weight:700;}
.trace-status.active{background:var(--green)18;color:var(--green);border:1px solid var(--green)30;}
.trace-status.inactive{background:#1a1a22;color:var(--t3);border:1px solid var(--b1);}
.trace-status.misread{background:var(--gold)18;color:var(--gold);border:1px solid var(--gold)30;}

.trace-score-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.tsb-label{font-size:10px;color:var(--t2);}
.tsb-total{font-size:18px;font-weight:700;line-height:1;}
.tsb-slash{font-size:12px;color:var(--t3);}
.tsb-min{font-size:12px;color:var(--t2);}
.tsb-cond{font-size:10px;color:var(--t3);margin-left:4px;}

.trace-feats{display:flex;flex-direction:column;gap:3px;}
.tf-row{display:grid;grid-template-columns:180px 60px 60px 36px;gap:6px;align-items:center;padding:4px 6px;border-radius:3px;}
.tf-row.pass{background:var(--green)08;}
.tf-row.fail{background:transparent;}
.tf-icon{font-size:11px;}
.tf-feat{font-size:10px;color:var(--t2);}
.tf-feat.pass{color:var(--t1);}
.tf-op{font-size:10px;font-family:monospace;color:var(--gold);}
.tf-val{font-size:11px;font-weight:700;text-align:right;}
.tf-val.pass{color:var(--green);}
.tf-val.fail{color:var(--t3);}
.tf-w{font-size:10px;text-align:right;color:var(--blue);}
.tf-w.fail{color:var(--t3);}

.trace-reason{font-size:10px;color:var(--t3);margin-top:6px;padding-top:6px;border-top:1px solid var(--b1);font-style:italic;}
.trace-reason.active{color:var(--green-dim);}
.trace-reason.miss{color:var(--orange);}

/* Layer dividers in trace */
.layer-sep{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--t3);padding:8px 0 4px;display:flex;align-items:center;gap:8px;}
.layer-sep::after{content:'';flex:1;height:1px;background:var(--b1);}

/* ── EDGE EXPLAIN ── */
.edge-block{background:var(--s2);border:1px solid var(--b1);border-radius:4px;padding:8px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.edge-from{font-size:11px;font-weight:700;}
.edge-arrow{font-size:14px;color:var(--t3);}
.edge-to{font-size:11px;font-weight:700;}
.edge-str{font-size:9px;padding:2px 7px;border-radius:3px;font-weight:700;margin-left:auto;}
.edge-str.strong{background:var(--green)18;color:var(--green);border:1px solid var(--green)30;}
.edge-str.moderate{background:var(--gold)18;color:var(--gold);border:1px solid var(--gold)30;}
.edge-str.weak{background:var(--blue)18;color:var(--blue);border:1px solid var(--blue)30;}
.edge-str.inactive{background:var(--b1);color:var(--t3);border:1px solid var(--b1);}
.edge-adopt{font-size:10px;color:var(--t3);margin-left:6px;}
.edge-adopt.yes{color:var(--green);}

/* ── FULL TRACE ── */
.trace-full{font-family:inherit;font-size:11px;line-height:1.8;color:var(--t2);white-space:pre-wrap;background:var(--s2);border:1px solid var(--b1);border-radius:4px;padding:14px;overflow-x:auto;}
.trace-full .hl-node{color:var(--green);font-weight:700;}
.trace-full .hl-score{color:var(--blue);}
.trace-full .hl-cluster{color:var(--red);font-weight:700;}
.trace-full .hl-path{color:var(--gold);}
.trace-full .hl-label{color:var(--t3);}

/* ── RESULT / TRACK B ── */
.result-summary{background:var(--s2);border:1px solid var(--red)30;border-radius:4px;padding:12px;margin-bottom:10px;}
.rs-cluster{font-size:16px;font-weight:700;color:var(--red);margin-bottom:4px;}
.rs-sub{font-size:10px;color:var(--t3);}

.tb-list{display:flex;flex-direction:column;gap:4px;}
.tb-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--s2);border-radius:4px;border:1px solid var(--b1);}
.tb-rank{font-size:16px;font-weight:700;color:var(--green);min-width:20px;}
.tb-body{flex:1;}
.tb-name{font-size:12px;font-weight:700;color:var(--t1);}
.tb-ko{font-size:10px;color:var(--t3);}
.tb-calc{font-size:10px;font-family:monospace;color:var(--blue);}
.tb-total{font-size:16px;font-weight:700;color:var(--green);}

.verdict-box{margin-top:12px;background:var(--s2);border:1px solid var(--b1);border-radius:4px;padding:10px;}
.vb-label{font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
textarea.vb-input{width:100%;height:70px;background:transparent;border:none;color:var(--t1);font-family:inherit;font-size:11px;resize:none;outline:none;line-height:1.6;}
.vb-save{font-size:10px;padding:4px 12px;border-radius:3px;border:1px solid var(--green)40;background:transparent;color:var(--green);cursor:pointer;font-family:inherit;}
.vb-save:hover{background:var(--green)15;}
.vb-saved{font-size:10px;color:var(--gold);margin-top:6px;font-style:italic;}

/* empty / error */
.empty{color:var(--t3);text-align:center;padding:40px 20px;line-height:2;}
.err{color:var(--red);background:var(--red)08;border:1px solid var(--red)22;border-radius:4px;padding:10px;margin-top:8px;font-size:10px;line-height:1.6;}

/* ── COVERAGE PANEL ── */
.cov-summary{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.cov-stat{background:var(--s2);border:1px solid var(--b1);border-radius:4px;padding:8px 12px;flex:1;min-width:80px;}
.cov-stat-num{font-size:22px;font-weight:700;line-height:1.1;}
.cov-stat-label{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}
.cov-row{display:grid;grid-template-columns:180px 1fr auto;gap:8px;align-items:center;padding:5px 8px;border-radius:3px;margin-bottom:3px;font-size:10px;}
.cov-row:hover{background:var(--s2);}
.cov-feat{font-family:monospace;color:var(--t2);}
.cov-types{display:flex;gap:3px;flex-wrap:wrap;}
.cov-type-tag{font-size:8px;padding:1px 5px;border-radius:2px;font-weight:700;}
.ct-t1{background:#5BB8FF15;color:#5BB8FF;border:1px solid #5BB8FF30;}
.ct-t2{background:#2ecc8a15;color:#2ecc8a;border:1px solid #2ecc8a30;}
.ct-t3{background:#c4973a15;color:#c4973a;border:1px solid #c4973a30;}
.ct-t4{background:#e0444415;color:#e04444;border:1px solid #e0444430;}
.cov-status{font-size:9px;font-weight:700;white-space:nowrap;}
.cov-ok{color:var(--green);}
.cov-miss{color:var(--red);}
.cov-warn{color:var(--gold);}
.cov-only-t3{color:var(--gold);}
.cov-section-hd{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin:12px 0 5px;padding-bottom:4px;border-bottom:1px solid var(--b1);}
.diversity-bar{display:flex;gap:2px;align-items:center;}
.db-seg{width:10px;height:10px;border-radius:2px;}
.db-seg.filled{opacity:1;}
.db-seg.empty{opacity:.18;}

/* scrollbar */
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
</style>
</head>
<body>

<div class="hd">
  <div>
    <span class="hd-logo">DOH</span>
    <span class="hd-title">Test Runner <em>v4</em></span>
    <span class="hd-ver">DEBUG MODE</span>
  </div>
  <div class="hd-badges">
    <span class="hb" style="background:#e0784018;border:1px solid #e0784033;color:#e07840">Node Explain</span>
    <span class="hb" style="background:#5b8def18;border:1px solid #5b8def33;color:#5b8def">Edge Explain</span>
    <span class="hb" style="background:#2ecc8a18;border:1px solid #2ecc8a33;color:#2ecc8a">Full Trace</span>
    <span id="case-badge" class="hb" style="background:#c4973a18;border:1px solid #c4973a33;color:#c4973a">Case 0</span>
  </div>
</div>

<div class="layout">
  <!-- LEFT -->
  <div class="left">
    <div class="ph">설문 JSON</div>
    <div class="pb">
      <textarea id="ji" placeholder='{"case_id":"CASE_001","golfer":"홍길동","date":"2026-06-25","survey":{"pressure_shift_quality":0,"weight_transfer_completion":0,"early_extension":2,"standing_up":2}}'></textarea>
      <button class="run" onclick="run()">▶ Run Pipeline</button>
      <div id="err"></div>

      <div class="sl">샘플</div>
      <div class="sg">
        <button class="sm" onclick="ls(0)">EE-압력</button>
        <button class="sm" onclick="ls(1)">EE-리드</button>
        <button class="sm" onclick="ls(2)">EE-회전</button>
        <button class="sm" onclick="ls(3)">복합A+C</button>
        <button class="sm" onclick="ls(4)">OTT</button>
        <button class="sm" onclick="ls(5)">리버스피벗</button>
        <button class="sm" onclick="ls(6)">이상적</button>
      </div>

      <div class="cl-head">
        케이스 로그
        <span id="cl-cnt" style="color:var(--t3)">0개</span>
        <button onclick="exportLog()" style="margin-left:auto;font-size:9px;padding:2px 6px;border-radius:3px;border:1px solid var(--b2);background:transparent;color:var(--t3);cursor:pointer;font-family:inherit;">Export</button>
        <button onclick="clearLog()" style="font-size:9px;padding:2px 6px;border-radius:3px;border:1px solid #e0444422;background:transparent;color:var(--red)55;cursor:pointer;font-family:inherit;">Clear</button>
      </div>
      <div class="cl-body" id="cl-body"></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="tabs">
      <div class="tab active" onclick="switchTab(0)">① Node Explain<span class="tab-badge" id="tb0">—</span></div>
      <div class="tab" onclick="switchTab(1)">② Edge Explain<span class="tab-badge" id="tb1">—</span></div>
      <div class="tab" onclick="switchTab(2)">③ Full Trace</div>
      <div class="tab" onclick="switchTab(3)">④ Result / Track B</div>
      <div class="tab" onclick="switchTab(4)">⑤ Coverage<span class="tab-badge" id="tb4">—</span></div>
    </div>

    <!-- Tab 0: Node Explain -->
    <div class="tab-content active" id="tc0">
      <div class="panel-2col">
        <div class="panel-col" id="ne-active"><div class="empty">실행 대기</div></div>
        <div class="panel-col" id="ne-inactive"><div class="empty">실행 대기</div></div>
      </div>
    </div>

    <!-- Tab 1: Edge Explain -->
    <div class="tab-content" id="tc1">
      <div class="panel" id="ee-panel"><div class="empty">실행 대기</div></div>
    </div>

    <!-- Tab 2: Full Trace -->
    <div class="tab-content" id="tc2">
      <div class="panel" id="ft-panel"><div class="empty">실행 대기</div></div>
    </div>

    <!-- Tab 3: Result / Track B -->
    <div class="tab-content" id="tc3">
      <div class="panel-2col">
        <div class="panel-col" id="tb-panel"><div class="empty">실행 대기</div></div>
        <div class="panel-col" id="vd-panel"><div class="empty">실행 대기</div></div>
      </div>
    </div>

    <!-- Tab 4: Coverage & Evidence Diversity -->
    <div class="tab-content" id="tc4">
      <div class="panel" id="cov-panel"><div class="empty">실행 대기 — Run Pipeline 후 표시됩니다</div></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// ENGINE DATA v3
// ══════════════════════════════════════
const SCHEMA={
  ROTATION:{color:"#5b8def",features:{x_factor:{range:[0,3],dir:"+good"},thorax_rotation:{range:[0,3],dir:"+good"},pelvis_rotation:{range:[0,3],dir:"+good"},rotation_source:{range:[0,3],dir:"type"},rotation_completion:{range:[0,3],dir:"+good"},early_turn:{range:[0,3],dir:"-bad"}}},
  POSTURE:{color:"#e07840",features:{loss_of_posture:{range:[0,3],dir:"-bad"},early_extension:{range:[0,3],dir:"-bad"},standing_up:{range:[0,3],dir:"-bad"},ee_timing:{range:[0,2],dir:"type"}}},
  PRESSURE:{color:"#5bc4ee",features:{pressure_shift_quality:{range:[0,3],dir:"+good"},trail_heel_load:{range:[0,2],dir:"type"},ground_force_usage:{range:[0,3],dir:"+good"},sway_severity:{range:[0,3],dir:"-bad"},reverse_pivot_severity:{range:[0,3],dir:"-bad"},weight_transfer_completion:{range:[0,3],dir:"+good"}}},
  LEAD_SIDE:{color:"#2ecc8a",features:{lead_leg_stability:{range:[0,3],dir:"+good"},lead_side_acceptance:{range:[0,3],dir:"+good"},slide_tendency:{range:[0,3],dir:"-bad"}}},
  TRAIL_SIDE:{color:"#8b6fdd",features:{trail_push:{range:[0,2],dir:"+good"},trail_foot_control:{range:[0,2],dir:"+good"}}},
  SEQUENCE:{color:"#dd6fa0",features:{kinematic_sequence:{range:[0,3],dir:"type"}}},
  RELEASE:{color:"#c4973a",features:{release_timing:{range:[0,3],dir:"type"},release_pattern:{range:[0,3],dir:"type"},shaft_lean:{range:[0,2],dir:"+good"},low_point_position:{range:[0,2],dir:"type"}}},
  ARM_PLANE:{color:"#9b59b6",features:{arm_lift_compensation:{range:[0,2],dir:"-bad"},hand_path:{range:[0,3],dir:"type"},ott_severity:{range:[0,3],dir:"-bad"}}},
  IMPACT:{color:"#e05a5a",features:{impact_stability:{range:[0,3],dir:"+good"},club_path_tendency:{range:[0,2],dir:"type"}}},
};

const NODES={
  N01:{id:"N01",name:"Pressure Shift Failure",ko:"압력 이동 실패",layer:"root_cause",pw:3,
    desc:"Trail→Lead 압력 이동 미발생. 지면반력 기반 붕괴의 시작점.",
    feats:[{f:"pressure_shift_quality",op:"<=",v:1,w:3},{f:"weight_transfer_completion",op:"<=",v:1,w:2},{f:"ground_force_usage",op:"<=",v:1,w:2},{f:"trail_heel_load",op:">=",v:2,w:1}],
    ms:3,rmc:2,rp:["pressure_shift_quality","weight_transfer_completion"]},
  N02:{id:"N02",name:"Lead Side Collapse",ko:"리드 사이드 붕괴",layer:"root_cause",pw:3,
    desc:"Lead 무릎·고관절이 다운스윙 시 버텨주지 못하고 목표 방향으로 무너짐.",
    feats:[{f:"lead_leg_stability",op:"<=",v:1,w:3},{f:"lead_side_acceptance",op:"<=",v:1,w:2},{f:"slide_tendency",op:">=",v:2,w:2}],
    ms:3,rmc:2,rp:["lead_leg_stability"]},
  N03:{id:"N03",name:"Reverse Pivot",ko:"리버스 피벗",layer:"root_cause",pw:3,
    desc:"백스윙 시 체중이 Lead발로 역이동 → 다운스윙 정상 전이 불가능.",
    feats:[{f:"reverse_pivot_severity",op:">=",v:2,w:3},{f:"weight_transfer_completion",op:"<=",v:1,w:2},{f:"sway_severity",op:">=",v:1,w:1}],
    ms:3,rmc:2,rp:["reverse_pivot_severity"]},
  N04:{id:"N04",name:"Rotation Stall",ko:"회전 정체",layer:"root_cause",pw:2,
    desc:"흉곽/골반 회전이 임팩트 직전 정체. 운동연쇄(Kinematic Sequence) 단절.",
    feats:[{f:"rotation_completion",op:"<=",v:1,w:3},{f:"early_turn",op:">=",v:2,w:2},{f:"kinematic_sequence",op:"<=",v:1,w:2},{f:"thorax_rotation",op:"<=",v:1,w:1}],

// ENGINE LOGIC
// ══════════════════════════════════════
function chkOp(val,op,v){
  if(op===">=") return val>=v;
  if(op==="<=") return val<=v;
  if(op==="==") return val===v;
  return false;
}

function fullVec(partial){
  const base={};
  Object.values(SCHEMA).forEach(fd=>Object.keys(fd.features).forEach(f=>{base[f]=0;}));
  return {...base,...partial};
}

function activateNodes(vec){
  const res={};
  Object.entries(NODES).forEach(([nid,n])=>{
    // TestRunner: rp 체크 생략 — vec의 0은 "미응답"이 아닌 유효한 진단값
    // (Survey는 undefined/null 기준 rp 검사 수행)
    let score=0, condMet=0;
    const featsDetail=n.feats.map(fc=>{
      const val=vec[fc.f]||0;
      const pass=chkOp(val,fc.op,fc.v);
      if(pass){score+=fc.w;condMet++;}
      return{...fc,val,pass};
    });
    const active=score>=n.ms && condMet>=n.rmc;
    let reason="";
    if(!active){
      if(score<n.ms) reason=`점수 부족 (${score}/${n.ms})`;
      else reason=`조건 수 부족 (${condMet}/${n.rmc})`;
    }
    res[nid]={active,score,condMet,reason,rpFail:[],featsDetail};
  });
  return res;
}

function findPaths(nodeMap){
  const actIds=Object.keys(nodeMap).filter(id=>nodeMap[id].active);
  const resIds=actIds.filter(id=>NODES[id]?.layer==="cluster_result");
  const all=[];
  resIds.forEach(rid=>{
    function dfs(cur,path,vis){
      const ups=EDGES.filter(e=>e.to===cur&&actIds.includes(e.from)&&!vis.has(e.from));
      if(ups.length===0){all.push([...path].reverse());return;}
      ups.forEach(e=>{vis.add(e.from);path.push(e.from);dfs(e.from,path,vis);path.pop();vis.delete(e.from);});
    }
    dfs(rid,[rid],new Set([rid]));
  });
  return all.sort((a,b)=>b.length-a.length);
}

function calcTrackB(nodeMap,paths){
  const actIds=Object.keys(nodeMap).filter(id=>nodeMap[id].active);
  const sc={};
  actIds.forEach(id=>{
    const n=NODES[id];
    if(!n||n.layer==="cluster_result") return;
    sc[id]={base:n.pw,upstream:0,bottleneck:n.bottleneck?1:0};
  });
  const resIds=actIds.filter(id=>NODES[id]?.layer==="cluster_result");
  resIds.forEach(rid=>{
    const vis={};
    const q=[{id:rid,dist:0}];
    while(q.length){
      const {id,dist}=q.shift();
      EDGES.forEach(e=>{
        if(e.to===id&&actIds.includes(e.from)&&!vis[e.from]){
          vis[e.from]=dist+1;q.push({id:e.from,dist:dist+1});
        }
      });
    }
    Object.entries(vis).forEach(([nid,d])=>{if(sc[nid]) sc[nid].upstream=Math.max(sc[nid].upstream,d);});
  });
  return Object.entries(sc)
    .map(([id,s])=>({id,n:NODES[id],base:s.base,up:Math.min(s.upstream,2),bt:s.bottleneck,total:s.base+Math.min(s.upstream,2)+s.bottleneck}))
    .sort((a,b)=>b.total-a.total);
}

// RENDER: NODE EXPLAIN
// ══════════════════════════════════════
function renderNodeExplain(nodeMap){
  const active=[],inactive=[];
  const layerOrder={root_cause:0,compensation:1,cluster_result:2};
  Object.entries(nodeMap).sort((a,b)=>(layerOrder[NODES[a[0]]?.layer]||0)-(layerOrder[NODES[b[0]]?.layer]||0))
    .forEach(([nid,na])=>{
      if(na.active) active.push([nid,na]);
      else inactive.push([nid,na]);
    });

  document.getElementById('tb0').textContent=`${active.length}활성/${inactive.length}비활성`;

  function renderBlock(nid,na){
    const n=NODES[nid];
    const lc=LC[n.layer]||"#888";
    const statusClass=na.active?"active":"inactive";
    const statusText=na.active?"✓ 활성":"✗ 비활성";

    const scoreColor=na.active?"var(--green)":na.score>0?"var(--gold)":"var(--t3)";

    let featsHtml=na.featsDetail.map(fd=>`
      <div class="tf-row ${fd.pass?"pass":"fail"}">
        <span class="tf-icon">${fd.pass?"✓":"✗"}</span>
        <span class="tf-feat ${fd.pass?"pass":""}">${fd.f}</span>
        <span class="tf-op">${fd.op}${fd.v} <span style="color:var(--t3)">= ${fd.val}</span></span>
        <span class="tf-w ${fd.pass?"":"fail"}">${fd.pass?"+"+fd.w:"—"}</span>
      </div>`).join('');

    let reasonText="";
    if(na.active) reasonText=`발화 성공: score ${na.score} ≥ ${n.ms}, 조건 ${na.condMet} ≥ ${n.rmc}`;
    else reasonText=na.reason;

    return `<div class="trace-block">
      <div class="trace-header">
        <span class="trace-node-id">${nid}</span>
        <span class="trace-node-name" style="color:${lc}">${n.name}</span>
        <span class="trace-status ${statusClass}">${statusText}</span>
      </div>
      <div class="trace-score-bar">
        <span class="tsb-label">Score</span>
        <span class="tsb-total" style="color:${scoreColor}">${na.score}</span>
        <span class="tsb-slash">/</span>
        <span class="tsb-min">${n.ms}</span>
        <span class="tsb-cond">조건 ${na.condMet}/${n.rmc}개</span>
      </div>
      <div class="trace-feats">${featsHtml}</div>
      ${n.desc?`<div style="font-size:9px;color:var(--t3);margin:4px 0 2px;line-height:1.5;padding:4px 6px;background:var(--s2);border-radius:3px">${n.desc}</div>`:''}
      <div class="trace-reason ${na.active?"active":"miss"}">${reasonText}</div>
    </div>`;
  }

  const layers={root_cause:"Root Cause",compensation:"Compensation",cluster_result:"Result"};
  let aHtml='<div class="sec-title">활성 노드 ('+active.length+'개)</div>';
  let prevLayer="";
  active.forEach(([nid,na])=>{
    const l=NODES[nid]?.layer;
    if(l!==prevLayer){aHtml+=`<div class="layer-sep" style="color:${LC[l]||"#888"}">${layers[l]||l}</div>`;prevLayer=l;}
    aHtml+=renderBlock(nid,na);
  });

  let iHtml='<div class="sec-title">비활성 노드 ('+inactive.length+'개)</div>';
  prevLayer="";
  inactive.forEach(([nid,na])=>{
    const l=NODES[nid]?.layer;
    if(l!==prevLayer){iHtml+=`<div class="layer-sep">${layers[l]||l}</div>`;prevLayer=l;}
    iHtml+=renderBlock(nid,na);
  });

  document.getElementById('ne-active').innerHTML=aHtml;
  document.getElementById('ne-inactive').innerHTML=iHtml;
}

// ══════════════════════════════════════
// RENDER: EDGE EXPLAIN
// ══════════════════════════════════════
function renderEdgeExplain(nodeMap,paths){
  const actIds=new Set(Object.keys(nodeMap).filter(id=>nodeMap[id].active));

  function onPath(f,t){
    return paths.some(p=>{for(let i=0;i<p.length-1;i++) if(p[i]===f&&p[i+1]===t) return true;return false;});
  }

  // Group: adopted → possible → inactive
  const adopted=[],possible=[],inactive_e=[];
  EDGES.forEach(e=>{
    const fAct=actIds.has(e.from),tAct=actIds.has(e.to);
    const onP=onPath(e.from,e.to);
    if(onP) adopted.push({...e,onP,fAct,tAct});
    else if(fAct&&tAct) possible.push({...e,onP,fAct,tAct});
    else inactive_e.push({...e,onP,fAct,tAct});
  });

  document.getElementById('tb1').textContent=`채택 ${adopted.length}`;

  function edgeBlock(e,label,labelColor){
    const fn=NODES[e.from]; const tn=NODES[e.to];
    const fc=LC[fn?.layer]||"#888"; const tc=LC[tn?.layer]||"#888";
    const strClass=e.onP?e.s:"inactive";
    const adoptText=e.onP?"경로 채택":e.fAct&&e.tAct?"양단 활성 (미채택)":"비활성";
    const adoptClass=e.onP?"yes":"";
    return `<div class="edge-block">
      <span class="edge-from" style="color:${fc}">${e.from}<br><span style="font-size:9px;font-weight:400;color:var(--t3)">${fn?.name||""}</span></span>
      <span class="edge-arrow">→</span>
      <span class="edge-to" style="color:${tc}">${e.to}<br><span style="font-size:9px;font-weight:400;color:var(--t3)">${tn?.name||""}</span></span>
      <span class="edge-str ${strClass}">${e.s}</span>
      <span class="edge-adopt ${adoptClass}">${adoptText}</span>
      ${e.note?`<span style="font-size:9px;color:var(--t3);margin-left:auto;text-align:right;max-width:140px">${e.note}</span>`:''}
    </div>`;
  }

  let html='';
  if(adopted.length){
    html+=`<div class="sec-title" style="color:var(--green)">채택된 엣지 (Primary Path)</div>`;
    adopted.forEach(e=>html+=edgeBlock(e));
  }
  if(possible.length){
    html+=`<div class="sec-title" style="color:var(--gold);margin-top:10px">양단 활성 — 미채택 (대안 경로 후보)</div>`;
    possible.forEach(e=>html+=edgeBlock(e));
  }
  if(inactive_e.length){
    html+=`<div class="sec-title" style="margin-top:10px">비활성 엣지 (${inactive_e.length}개)</div>`;
    inactive_e.forEach(e=>html+=edgeBlock(e));
  }

  document.getElementById('ee-panel').innerHTML=html||'<div class="empty">엣지 없음</div>';
}

  lines.push(``);

        lines.push(`         ✓ ${f.f} ${f.op}${f.v} (val=${f.val}) +${f.w}`);

  lines.push(``);
  lines.push(`── STEP 3: PATH TRACING ──`);
  if(paths.length===0){
    lines.push(`  결과 없음: 활성 Result 노드 없음`);
  } else {
    paths.slice(0,3).forEach((p,i)=>{
      const isWeak=p.length===2&&EDGES.find(e=>e.from===p[0]&&e.to===p[1]&&e.s==="weak");
      lines.push(`  Path ${i+1}${isWeak?" [WEAK — 임상검증 필요]":""}:`);
      lines.push(`  ${p.join(" → ")}`);
      lines.push(`  ${p.map(id=>NODES[id]?.name||id).join(" → ")}`);

    });

  lines.push(`── STEP 4: CLUSTER RESULT ──`);
  if(resultIds.length===0) lines.push(`  정상 패턴 또는 데이터 부족`);
  resultIds.forEach(id=>lines.push(`  ${NODES[id].cluster} — ${NODES[id].name} (${NODES[id].ko})`));

    lines.push(`  ${i+1}. [${t.id}] ${t.n.name.padEnd(28)} score=${t.total} (base=${t.base}+up=${t.up}+bt=${t.bt})`);

  const raw=lines.join("\n");

// ══════════════════════════════════════
// CLUSTER / CHAIN ENGINE
// ══════════════════════════════════════
function checkRule(vec,r){
  const v=vec[r.f]||0;
  if(r.op===">=") return v>=r.v;
  if(r.op==="<=") return v<=r.v;
  if(r.op==="==") return v===r.v;
  return false;
}
function classifyClusters(vec){
  const matched=[];
  Object.entries(CLUSTERS).forEach(([cid,cl])=>{
    if(!cl.rules.every(r=>checkRule(vec,r))) return;
    // TestRunner: rp 체크 생략 (Survey에서 담당)
    if(cl.ra.length&&!cl.ra.some(f=>(vec[f]||0)>0)) return;
    const score=cl.rp.reduce((s,f)=>s+(vec[f]||0),0)+cl.ra.reduce((s,f)=>s+(vec[f]||0),0);
    matched.push({cid,cl,score});
  });
  return matched.sort((a,b)=>b.score-a.score);
}
function scoreChain(vec,chain){
  return chain.ra.reduce((s,r)=>{
    const v=vec[r.f]||0;
    if(r.op===">=") return s+(v>=r.v?v:0);
    if(r.op==="<=") return s+(v<=r.v?Math.max(0,3-v):0);
    if(r.op==="==") return s+(v===r.v?1:0);
    return s;
  },0);
}
function selectChains(vec,clusterIds){
  const result={};
  clusterIds.forEach(cid=>{
    const candidates=Object.entries(CHAINS)
      .filter(([,ch])=>ch.cluster===cid)
      .map(([chId,ch])=>({chId,ch,score:scoreChain(vec,ch),hasSignal:ch.ra.length===0||ch.ra.some(r=>checkRule(vec,r))}))
      .filter(c=>c.hasSignal)
      .sort((a,b)=>b.score-a.score);
    if(candidates.length>0){
      const primary=candidates[0];
      const secondary=candidates.slice(1).filter(c=>c.score>=primary.score*0.6&&c.score>0);
      result[cid]={primary,secondary};
    }
  });
  return result;
}

const ET_LABEL = {T1:"Type1 Direct",T2:"Type2 Result",T3:"Type3 Feel",T4:"Type4 Hidden"};
const ET_COLOR = {T1:"ct-t1",T2:"ct-t2",T3:"ct-t3",T4:"ct-t4"};

function renderCoverage(vec) {
  // 전체 Feature 목록 (SCHEMA 기준)
  const allFeats = {};
  Object.entries(SCHEMA).forEach(([grp, gd]) => {
    Object.keys(gd.features).forEach(f => { allFeats[f] = grp; });
  });

  // 각 Feature별 수집 여부 및 Evidence Diversity 계산
  let covered = 0, missing = 0, onlyFeel = 0, hasType4 = 0;
  const rows = [];

  Object.entries(allFeats).forEach(([feat, grp]) => {
    const types = EVIDENCE_MAP[feat] || [];
    const isCovered = types.length > 0;
    const isOnlyFeel = isCovered && types.every(t => t === "T3");
    const hasT4 = types.includes("T4");
    const hasT1 = types.includes("T1");
    const hasT2 = types.includes("T2");
    const hasT3 = types.includes("T3");
    const inInput = vec[feat] !== undefined && vec[feat] !== 0;
    const grpColor = SCHEMA[grp]?.color || "#888";

    if (isCovered) covered++; else missing++;
    if (isOnlyFeel) onlyFeel++;
    if (hasT4) hasType4++;

    // Diversity score: T1+T2 = 각 1점, T3 = 0.5점, T4 = -0.5점
    const diversity = (hasT1?1:0) + (hasT2?1:0) + (hasT3?0.5:0) - (hasT4?0.5:0);

    rows.push({feat, grp, grpColor, types, isCovered, isOnlyFeel, hasT4, inInput, diversity});
  });

  // 요약 통계
  document.getElementById('tb4').textContent = `${covered}/${Object.keys(allFeats).length}`;

  // 섹션 분류
  const missingRows = rows.filter(r => !r.isCovered);
  const onlyFeelRows = rows.filter(r => r.isOnlyFeel);
  const t4Rows = rows.filter(r => r.hasT4);
  const goodRows = rows.filter(r => r.isCovered && !r.isOnlyFeel && !r.hasT4);

  function renderRow(r) {
    const typeTags = r.types.map(t =>
      `<span class="cov-type-tag ${ET_COLOR[t]}">${t}</span>`
    ).join('');
    // Diversity bar: 4칸 (T1 T2 T3 T4)
    const bar = ['T1','T2','T3','T4'].map(t => {
      const has = r.types.includes(t);
      return `<div class="db-seg ${has?'filled':'empty'}" style="background:${has?{T1:'#5BB8FF',T2:'#2ecc8a',T3:'#c4973a',T4:'#e04444'}[t]:'#333'}"></div>`;
    }).join('');

    const statusText = !r.isCovered ? `<span class="cov-status cov-miss">✗ 미수집</span>`
      : r.isOnlyFeel ? `<span class="cov-status cov-warn">△ Feel전용</span>`
      : r.hasT4 ? `<span class="cov-status cov-warn">⚠ T4포함</span>`
      : `<span class="cov-status cov-ok">✓</span>`;

    const inputMark = r.inInput ? `<span style="font-size:8px;color:var(--green);margin-left:3px">●입력</span>` : '';

    return `<div class="cov-row">
      <span class="cov-feat" style="color:${r.grpColor}8f">${r.feat}${inputMark}</span>
      <div class="cov-types">${typeTags || '<span style="font-size:9px;color:var(--t3)">—</span>'}
        <div class="diversity-bar" style="margin-left:4px">${bar}</div>
      </div>
      ${statusText}
    </div>`;
  }

  let html = `
    <div class="cov-summary">
      <div class="cov-stat">
        <div class="cov-stat-num" style="color:var(--green)">${covered}</div>
        <div class="cov-stat-label">수집됨</div>
      </div>
      <div class="cov-stat">
        <div class="cov-stat-num" style="color:var(--red)">${missing}</div>
        <div class="cov-stat-label">미수집</div>
      </div>
      <div class="cov-stat">
        <div class="cov-stat-num" style="color:var(--gold)">${onlyFeel}</div>
        <div class="cov-stat-label">Feel전용</div>
      </div>
      <div class="cov-stat">
        <div class="cov-stat-num" style="color:var(--red)">${hasType4}</div>
        <div class="cov-stat-label">T4포함</div>
      </div>
      <div class="cov-stat">
        <div class="cov-stat-num" style="color:var(--t2)">${Object.keys(allFeats).length}</div>
        <div class="cov-stat-label">전체 Feature</div>
      </div>
    </div>
    <div style="font-size:9px;color:var(--t3);margin-bottom:10px;line-height:1.7;padding:6px 8px;background:var(--s2);border-radius:3px;">
      <span style="color:var(--t2)">Diversity Bar:</span>
      <span style="color:#5BB8FF">■T1 Direct</span> &nbsp;
      <span style="color:#2ecc8a">■T2 Result</span> &nbsp;
      <span style="color:#c4973a">■T3 Feel</span> &nbsp;
      <span style="color:#e04444">■T4 Hidden</span>
      &nbsp;— 다양한 Type이 채워질수록 Evidence 다양성 ↑
    </div>`;

  if (missingRows.length) {
    html += `<div class="cov-section-hd" style="color:var(--red)">✗ 미수집 Feature — 엔진 활성화 불가 (${missingRows.length}개)</div>`;
    missingRows.forEach(r => html += renderRow(r));
  }

  if (onlyFeelRows.length) {
    html += `<div class="cov-section-hd" style="color:var(--gold)">△ Feel 전용 수집 — 신뢰도 0.40~0.65 (${onlyFeelRows.length}개)</div>`;
    onlyFeelRows.forEach(r => html += renderRow(r));
  }

  if (t4Rows.length) {
    html += `<div class="cov-section-hd" style="color:var(--orange)">⚠ Type4 포함 — 응답 신뢰도 주의 (${t4Rows.length}개)</div>`;
    t4Rows.forEach(r => html += renderRow(r));
  }

  html += `<div class="cov-section-hd" style="color:var(--green)">✓ 양호한 Coverage (${goodRows.length}개)</div>`;
  goodRows.forEach(r => html += renderRow(r));

  document.getElementById('cov-panel').innerHTML = html;
}

// ══════════════════════════════════════
// MAIN
// ══════════════════════════════════════
let cur=null;

function run(){
  const raw=document.getElementById('ji').value.trim();
  document.getElementById('err').innerHTML='';
  let parsed;
  try{parsed=JSON.parse(raw);}
  catch(e){document.getElementById('err').innerHTML=`<div class="err">JSON 오류: ${e.message}</div>`;return;}

  const survey=parsed.survey||parsed;
  const caseId=parsed.case_id||`CASE_${Date.now()}`;
  const golfer=parsed.golfer||"미상";
  const date=parsed.date||new Date().toISOString().slice(0,10);

  const vec=fullVec(survey);
  const nodeMap=activateNodes(vec);
  const paths=findPaths(nodeMap);
  const trackB=calcTrackB(nodeMap,paths);

  cur={caseId,golfer,date,vec,nodeMap,paths,trackB,raw:parsed};

  renderNodeExplain(nodeMap);
  renderEdgeExplain(nodeMap,paths);
  renderFullTrace(caseId,golfer,date,vec,nodeMap,paths,trackB);
  renderResult(nodeMap,paths,trackB,caseId);
  renderCoverage(vec);

  saveCase(cur);
}

// TABS
// ══════════════════════════════════════
function switchTab(idx){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.tab-content').forEach((t,i)=>t.classList.toggle('active',i===idx));
}

// ══════════════════════════════════════
// CASE LOG
// ══════════════════════════════════════
let caseLog=JSON.parse(localStorage.getItem('doh_v2_cases')||'[]');

function saveCase(r){
  const actIds=Object.keys(r.nodeMap).filter(id=>r.nodeMap[id].active);
  const clusters=actIds.filter(id=>NODES[id]?.layer==="cluster_result").map(id=>NODES[id]?.cluster||id);
  const entry={caseId:r.caseId,golfer:r.golfer,date:r.date,clusters,raw:r.raw,ts:Date.now()};
  const idx=caseLog.findIndex(c=>c.caseId===r.caseId);
  if(idx>=0) caseLog[idx]=entry; else caseLog.unshift(entry);
  localStorage.setItem('doh_v2_cases',JSON.stringify(caseLog));
  renderLog();
}

function getVerdict(caseId){
  return (JSON.parse(localStorage.getItem('doh_v2_verdicts')||'{}'))[caseId]||'';
}
window.saveVerdict=function(caseId){
  const v=document.getElementById('vi')?.value||'';
  const vd=JSON.parse(localStorage.getItem('doh_v2_verdicts')||'{}');
  vd[caseId]=v; localStorage.setItem('doh_v2_verdicts',JSON.stringify(vd));
  const box=document.querySelector('.vb-saved');
  if(box) box.textContent='저장됨: '+v;
};

function renderLog(){
  const vd=JSON.parse(localStorage.getItem('doh_v2_verdicts')||'{}');
  document.getElementById('cl-cnt').textContent=caseLog.length+'개';
  document.getElementById('case-badge').textContent='Case '+caseLog.length;
  let html='';
  caseLog.forEach((c,i)=>{
    const hasV=!!vd[c.caseId];
    html+=`<div class="cl-row${cur?.caseId===c.caseId?' sel':''}" onclick="loadLog(${i})">
      <span class="cl-id">#${caseLog.length-i}</span>
      <span class="cl-name">${c.golfer}·${c.date}</span>
      ${hasV?'<span class="cl-v">✎</span>':''}
      <span class="cl-tag">${c.clusters.join(",")||"정상"}</span>
    </div>`;
  });
  document.getElementById('cl-body').innerHTML=html||'';
}

function loadLog(idx){
  const c=caseLog[idx];
  if(!c) return;
  document.getElementById('ji').value=JSON.stringify(c.raw,null,2);
  run();
}

function clearLog(){
  if(!confirm('로그 초기화?')) return;
  caseLog=[];
  localStorage.removeItem('doh_v2_cases');
  localStorage.removeItem('doh_v2_verdicts');
  renderLog();
}

function exportLog(){
  const vd=JSON.parse(localStorage.getItem('doh_v2_verdicts')||'{}');
  const blob=new Blob([JSON.stringify({cases:caseLog,verdicts:vd,engine_version:"v3",exported:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`DOH_Debug_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
